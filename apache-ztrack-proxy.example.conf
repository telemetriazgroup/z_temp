# Fragmento para el vhost HTTPS de ztrack.app (Apache 2.4+).
#
# Las APIs van bajo /reefer/telemetria/... (mismo prefijo que la SPA).
# Con sólo esto basta — no hace falta ProxyPass aparte para /telemetria/.
#
# Requiere: a2enmod proxy proxy_http ssl headers (headers opcional, para CORS).

# ProxyPass /reefer/ http://161.132.53.51:3002/reefer/
# ProxyPassReverse /reefer/ http://161.132.53.51:3002/reefer/

# Cabeceras CORS opcionales en rutas de API (suele no hacer falta en mismo origen).
<LocationMatch "^/reefer/telemetria">
    Header unset Access-Control-Allow-Origin
    Header always set Access-Control-Allow-Origin "https://ztrack.app"
    Header always set Access-Control-Allow-Methods "GET, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization"
    Header always set Access-Control-Max-Age "86400"
</LocationMatch>

# Si proxeas /telemetria/ aparte (build antiguo), mantén además:
# ProxyPass        /telemetria/ http://161.132.53.51:3002/telemetria/
# ProxyPassReverse /telemetria/ http://161.132.53.51:3002/telemetria/
