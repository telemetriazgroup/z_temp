# Fragmento para el vhost HTTPS de ztrack.app (Apache 2.4+).
#
# Mismo origen: https://ztrack.app/reefer + https://ztrack.app/telemetria
# → el navegador NO aplica CORS entre ellos. Los datos se ven si el ProxyPass
# de /telemetria/ está bien y el backend responde.
# CORS desde HTTP directo (http://161.132...) no arregla "Mixed Content": la página
# HTTPS no puede llamar APIs HTTP aunque el servidor tenga Access-Control-Allow-Origin.
#
# Las cabeceras CORS de abajo ayudan si el backend envía Allow-Origin conflictivo,
# si llamas la API desde otro dominio, o si en el futuro hay preflight (OPTIONS).
#
# Requiere: a2enmod proxy proxy_http ssl headers
# Ajusta host:puerto si tu stack reefer no está en 161.132.53.51:3002.

# --- SPA reefer ---
# ProxyPass /reefer/ http://161.132.53.51:3002/reefer/
# ProxyPassReverse /reefer/ http://161.132.53.51:3002/reefer/

ProxyPass        /telemetria/ http://161.132.53.51:3002/telemetria/
ProxyPassReverse /telemetria/ http://161.132.53.51:3002/telemetria/

# Cabeceras CORS (opcional en mismo origen). Cambia el origen si tu front es otro dominio.
<LocationMatch "^/telemetria">
    Header unset Access-Control-Allow-Origin
    Header always set Access-Control-Allow-Origin "https://ztrack.app"
    Header always set Access-Control-Allow-Methods "GET, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization"
    Header always set Access-Control-Max-Age "86400"
</LocationMatch>

# Alternativa: proxear desde Apache directo a los backends HTTP (sin pasar por :3002).
# Comenta los ProxyPass /telemetria/ anteriores y el LocationMatch si duplican cabeceras.
# Descomenta:
#
# ProxyPass        /telemetria/tunel-termoking/ http://161.132.53.51:9051/
# ProxyPassReverse /telemetria/tunel-termoking/ http://161.132.53.51:9051/
#
# ProxyPass        /telemetria/starcool/ http://161.132.206.104:9112/
# ProxyPassReverse /telemetria/starcool/ http://161.132.206.104:9112/
