server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # APIs bajo /reefer/telemetria/ (mismo ProxyPass Apache que la SPA).
    location /reefer/telemetria/tunel-termoking/ {
        proxy_pass http://161.132.53.51:9051/;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_read_timeout 300s;
    }

    location /reefer/telemetria/starcool/ {
        proxy_pass http://161.132.206.104:9112/;
        proxy_http_version 1.1;
        proxy_connect_timeout 75s;
        proxy_read_timeout 300s;
    }

    # La app está publicada bajo /reefer/ (vite base: '/reefer/').
    # Los ficheros del dist van en html/reefer/ para que /reefer/assets/* exista en disco.
    location /reefer/ {
        try_files $uri $uri/ /reefer/index.html;
    }

    location = /reefer {
        return 301 /reefer/;
    }

    location = / {
        return 302 /reefer/;
    }

    location ~* ^/reefer/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
