server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # Raíz — SPA (monitor en /)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Mismo SPA bajo prefijo /reefer/ (cliente debe usar basename en React Router)
  location = /reefer {
    return 308 /reefer/;
  }

  location /reefer/ {
    try_files $uri $uri/ /index.html;
  }
}
