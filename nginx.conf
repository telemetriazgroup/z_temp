server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # La app está publicada bajo /reefer/ (vite base: '/reefer/').
    # Los ficheros del dist van en html/reefer/ para que /reefer/assets/* exista en disco.
    location /reefer/ {
        try_files $uri $uri/ /reefer/index.html;
    }

    location = /reefer {
        return 301 /reefer/;
    }

    location = / {
        return 302 /reefer/;
    }

    location ~* ^/reefer/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
